version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cornbreed_postgres
    environment:
      POSTGRES_DB: corn_breed_unpad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cornbreed_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cornbreed_redis
    ports:
      - "6379:6379"
    networks:
      - cornbreed_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cornbreed_backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=corn_breed_unpad
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - backend_storage:/var/www/html/storage/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cornbreed_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cornbreed_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - cornbreed_network

volumes:
  postgres_data:
  backend_storage:

networks:
  cornbreed_network:
    driver: bridge
